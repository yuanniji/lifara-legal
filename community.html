    <h1>社区规范</h1>
    <p class="meta">Lifara（历界） · 更新日期：2026-07-16</p>
    <h2>1. 友善结伴</h2>
    <p>尊重每一位参与者。发起活动请写清时间地点与期望；加入后请准时到场或提前沟通。</p>
    <h2>2. 真实攻略</h2>
    <p>分享亲历体验，标明关键信息与注意事项。禁止抄袭、虚假宣传或诱导消费的误导内容。</p>
    <h2>3. 禁止事项</h2>
    <p>禁止色情低俗、仇恨歧视、暴力恐吓、诈骗广告、侵犯隐私与未授权商业营销。</p>
    <h2>4. 举报与处理</h2>
    <p>遇到违规行为可通过黑名单与设置中的反馈入口处理。严重违规可能导致内容下架或账号限制。</p>
